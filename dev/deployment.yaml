apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dev-app
  template:
    metadata:
      labels:
        app: dev-app
    spec:
      containers:
      - name: dev-container
        image: grc.io/qwiklabs-gcp-02-7d9c7dabb737/sample-app:v2.0
        ports:
        - containerPort: 8080
